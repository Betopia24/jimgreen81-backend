name: CI/CD Deploy to EC2 (PM2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.USER }} # ubuntu
          key: ${{ secrets.SSH_KEY }} # .pem content
          script: |
            set -e

            echo "🔹 Load NVM (FIXED PATH)"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

            echo "🔹 Use correct Node version"
            nvm use 24 || nvm install 24

            echo "🔹 Debug Node"
            node -v
            npm -v

            echo "🔹 Go to project directory"
            cd /var/www/jimgreen81-backend

            echo "🔹 Reset repo (NO CONFLICT EVER)"
            git fetch origin
            git reset --hard origin/main

            echo "🔹 Install dependencies"
            npm ci

            echo "🔹 Build project"
            npm run build

            echo "🔹 Restart PM2 (SMART WAY)"

            # Try reload first (zero downtime)
            pm2 reload jimgreen81-backend && echo "Reload success" || {

              echo "⚠️ PM2 app not found, starting new one..."

              # Start using npm script (your requirement)
              pm2 start npm --name "jimgreen81-backend" -- run start
            }

            echo "🔹 Save PM2 process"
            pm2 save

            echo "✅ Deployment Successful!"
